name: Test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:data
      - name: Edge function tests
        run: node --test tests/edge-functions.test.mjs
      - name: MDX lint
        run: node --test tests/mdx-lint.test.mjs
      - name: Edge function bundle check
        run: |
          for f in api/*.js; do
            case "$(basename "$f")" in _*) continue;; esac
            npx esbuild "$f" --bundle --format=esm --platform=browser --outfile=/dev/null || {
              echo "ERROR: esbuild failed to bundle $f"
              exit 1
            }
          done
